<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>신비의 계양 꽃길 가이드</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        * { box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; background: #fffcf9; margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #444; }

        .app-container { width: 92%; max-width: 420px; background: white; border-radius: 35px; padding: 35px 20px; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.06); text-align: center; border: 1px solid #f0f0f0; }
        
        /* 실시간 정보 영역 */
        .weather-info { margin-bottom: 20px; }
        .temp-main { font-size: 2.2rem; font-weight: 800; color: #333; }
        .temp-main span { font-size: 1.2rem; color: #ff4d6d; }
        
        .badge-container { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .info-badge { padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; color: white; }
        .bg-uv { background: #ff9f43; }
        .bg-score { background: #10ac84; }

        .weather-ment { font-size: 0.95rem; color: #666; margin: 15px 0 25px; line-height: 1.6; word-break: keep-all; min-height: 3em; }

        /* 이미지 및 카드 */
        .image-card-container { width: 100%; aspect-ratio: 2 / 1; border-radius: 20px; overflow: hidden; margin-bottom: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); background: #fdf2f4; }
        .image-card-container img { width: 100%; height: 100%; object-fit: cover; }

        .recommend-box { background: #fff5f6; border-radius: 30px; padding: 25px; position: relative; border: 1px solid #ffe4e6; }
        .flower-badge { background: #ff9a9e; color: white; padding: 6px 18px; border-radius: 50px; font-size: 0.8rem; font-weight: bold; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); box-shadow: 0 4px 10px rgba(255,154,158,0.2); }
        .place-title { font-size: 1.6rem; font-weight: 800; color: #ff4d6d; margin: 10px 0; }
        
        .detail-btn { background: white; border: 1px solid #ff9a9e; color: #ff9a9e; padding: 10px 22px; border-radius: 50px; font-size: 0.88rem; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .detail-content { display: none; margin-top: 18px; font-size: 0.92rem; color: #666; line-height: 1.7; text-align: left; background: #fff; padding: 20px; border-radius: 20px; border: 1px solid #f0f0f0; }
        
        .map-link-btn { display: inline-flex; align-items: center; justify-content: center; width: 100%; margin-top: 15px; padding: 12px; background: #03C75A; color: white; text-decoration: none; border-radius: 12px; font-size: 0.85rem; font-weight: 700; }
        
        .status-info { margin-top: 25px; font-size: 0.82rem; color: #ff7b8f; font-weight: 700; }
        .footer { margin-top: 35px; font-size: 0.72rem; color: #c8c8c8; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="weather-info">
            <div class="temp-main"><span id="temp-val">--</span>°C</div>
            <div class="badge-container">
                <div id="uv-badge" class="info-badge bg-uv">자외선 --</div>
                <div id="score-badge" class="info-badge bg-score">산책지수 --점</div>
            </div>
        </div>

        <div id="ment" class="weather-ment">오늘의 꽃길 데이터 분석 중... 🌸</div>

        <div class="image-card-container">
            <img id="flower-img" src="" alt="꽃 이미지" />
        </div>

        <div class="recommend-box">
            <div id="flower-name" class="flower-badge">LOADING</div>
            <div id="place-name" class="place-title">추천 명소</div>
            <button class="detail-btn" onclick="toggleDetail()">🌸 신비의 꽃길 가이드 보기</button>
            <div id="detail-text" class="detail-content"></div>
        </div>

        <div id="flower-status" class="status-info">시즌 데이터 분석 중... 🌸</div>
        <div class="footer">계양구청 홍보미디어실 홍보팀</div>
    </div>

<script>
const WEATHER_KEY = "9cfb1322b09b83b481a5aa7e7bb6b51e11b6e4f389cc6edd2b8512d7df88fcc4";
const AREA_NO = "2824500000";

// 꽃 DB
const flowerDB = [
  { id: "DAFFODIL", name: "수선화", place: "계양아라온", img: "flower_01_daffodil.png",
    guide: "계양아라온 수선화밭 🌼", mapUrl: "https://naver.me/FQVGhxu8" },
  { id: "AZALEA", name: "진달래", place: "계양산", img: "flower_02_azalea.png",
    guide: "계양산 진달래 🌺", mapUrl: "https://naver.me/Gj6XOEGG" },
  { id: "CHERRY", name: "벚꽃", place: "서부간선수로", img: "flower_03_cherryblossom.png",
    guide: "벚꽃 터널 🌸", mapUrl: "https://naver.me/xCByNMz0" },
  { id: "ROSE", name: "장미", place: "계양산 장미원", img: "flower_04_rose.png",
    guide: "장미 명소 🌹", mapUrl: "https://naver.me/5iTI0W6A" },
  { id: "WAITING", name: "개화 대기", place: "계양산", img: "waiting_flower.png",
    guide: "아직 개화 전 ❄️", mapUrl: "" }
];

function getFlowerById(id) {
  return flowerDB.find(f => f.id === id) || flowerDB[0];
}

function pickFlower(month, day) {
  const today = month * 100 + day;

  if (today < 315) return getFlowerById("WAITING");
  if (today <= 331) return getFlowerById("DAFFODIL");
  if (today <= 415) return getFlowerById("CHERRY");
  if (today <= 630) return getFlowerById("ROSE");

  return getFlowerById("WAITING");
}

function renderFlower(flower) {
  document.getElementById("flower-name").innerText = flower.name;
  document.getElementById("place-name").innerText = flower.place;
  document.getElementById("flower-img").src = "./" + flower.img;
  document.getElementById("detail-text").innerHTML = `
    <div>${flower.guide}</div>
    ${flower.mapUrl ? `<a href="${flower.mapUrl}" target="_blank" class="map-link-btn">📍 지도 보기</a>` : ''}
  `;
}

function updateDashboard(temp, pty, uv) {
  document.getElementById("temp-val").innerText = temp;

  let uvText = "보통";
  if (uv >= 8) uvText = "매우높음";
  else if (uv >= 6) uvText = "높음";
  document.getElementById("uv-badge").innerText = `자외선 ${uvText}`;

  let score = 95;
  if (pty !== "0") score -= 40;
  if (temp < 5 || temp > 30) score -= 15;
  if (uv >= 8) score -= 10;

  document.getElementById("score-badge").innerText = `산책지수 ${score}점`;

  let ment = `오늘 기온 ${temp}도. `;
  if (pty !== "0") ment += "비가 와요 ☔";
  else if (uv >= 6) ment += "햇빛 강함 ☀️";
  else ment += "산책하기 좋아요 🌿";

  document.getElementById("ment").innerText = ment;
}

function toggleDetail() {
  const d = document.getElementById("detail-text");
  d.style.display = d.style.display === "block" ? "none" : "block";
}

async function fetchJsonSafe(url, label) {
  console.log(label + " URL:", url);

  const res = await fetch(url);
  console.log(label + " status:", res.status);

  const text = await res.text();
  console.log(label + " raw:", text);

  if (!res.ok) {
    throw new Error(`${label} 실패 (${res.status}): ${text}`);
  }

  return JSON.parse(text);
}

async function loadApp() {
  const now = new Date();
  const ymd =
    now.getFullYear() +
    String(now.getMonth() + 1).padStart(2, "0") +
    String(now.getDate()).padStart(2, "0");

  // 꽃 먼저 표시
  const flower = pickFlower(now.getMonth() + 1, now.getDate());
  renderFlower(flower);

  try {
    // 🌡️ 날씨
    const weatherUrl =
      `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst` +
      `?serviceKey=${WEATHER_KEY}` +
      `&dataType=JSON&numOfRows=200&pageNo=1` +
      `&base_date=${ymd}&base_time=0500&nx=54&ny=126`;

    const weatherData = await fetchJsonSafe(weatherUrl, "weather");

    const items = weatherData?.response?.body?.items?.item || [];
    const temp = items.find(i => i.category === "TMP")?.fcstValue;
    const pty = items.find(i => i.category === "PTY")?.fcstValue;

    if (!temp) throw new Error("기온 데이터 없음");

    // ☀️ 자외선
    const uvUrl =
      `https://apis.data.go.kr/1360000/LivingWthrIdxServiceV3/getUVIdxV3` +
      `?serviceKey=${WEATHER_KEY}` +
      `&dataType=JSON&areaNo=${AREA_NO}&time=${ymd}12`;

    const uvData = await fetchJsonSafe(uvUrl, "uv");

    const uv = uvData?.response?.body?.items?.item?.[0]?.today || 0;

    updateDashboard(temp, pty || "0", uv);

  } catch (e) {
    console.error("API ERROR:", e);
    document.getElementById("ment").innerText = "⚠️ 날씨 데이터를 불러오지 못했어요";
  }
}

loadApp();
</script>
</body>
</html>
