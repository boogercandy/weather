<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>신비의 계양 꽃길 가이드</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        * { box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; background: #fffcf9; margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #444; }

        .app-container { width: 92%; max-width: 420px; background: white; border-radius: 35px; padding: 35px 20px; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.06); text-align: center; border: 1px solid #f0f0f0; }
        
        /* 실시간 정보 영역 */
        .weather-info { margin-bottom: 20px; }
        .temp-main { font-size: 2.2rem; font-weight: 800; color: #333; }
        .temp-main span { font-size: 1.2rem; color: #ff4d6d; }
        
        .badge-container { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .info-badge { padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; color: white; }
        .bg-uv { background: #ff9f43; }
        .bg-score { background: #10ac84; }

        .weather-ment { font-size: 0.95rem; color: #666; margin: 15px 0 25px; line-height: 1.6; word-break: keep-all; min-height: 3em; }

        /* 이미지 및 카드 */
        .image-card-container { width: 100%; aspect-ratio: 2 / 1; border-radius: 20px; overflow: hidden; margin-bottom: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); background: #fdf2f4; }
        .image-card-container img { width: 100%; height: 100%; object-fit: cover; }

        .recommend-box { background: #fff5f6; border-radius: 30px; padding: 25px; position: relative; border: 1px solid #ffe4e6; }
        .flower-badge { background: #ff9a9e; color: white; padding: 6px 18px; border-radius: 50px; font-size: 0.8rem; font-weight: bold; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); box-shadow: 0 4px 10px rgba(255,154,158,0.2); }
        .place-title { font-size: 1.6rem; font-weight: 800; color: #ff4d6d; margin: 10px 0; }
        
        .detail-btn { background: white; border: 1px solid #ff9a9e; color: #ff9a9e; padding: 10px 22px; border-radius: 50px; font-size: 0.88rem; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .detail-content { display: none; margin-top: 18px; font-size: 0.92rem; color: #666; line-height: 1.7; text-align: left; background: #fff; padding: 20px; border-radius: 20px; border: 1px solid #f0f0f0; }
        
        .map-link-btn { display: inline-flex; align-items: center; justify-content: center; width: 100%; margin-top: 15px; padding: 12px; background: #03C75A; color: white; text-decoration: none; border-radius: 12px; font-size: 0.85rem; font-weight: 700; }
        
        .status-info { margin-top: 25px; font-size: 0.82rem; color: #ff7b8f; font-weight: 700; }
        .footer { margin-top: 35px; font-size: 0.72rem; color: #c8c8c8; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="weather-info">
            <div class="temp-main"><span id="temp-val">--</span>°C</div>
            <div class="badge-container">
                <div id="uv-badge" class="info-badge bg-uv">자외선 --</div>
                <div id="score-badge" class="info-badge bg-score">산책지수 --점</div>
            </div>
        </div>

        <div id="ment" class="weather-ment">오늘의 꽃길 데이터 분석 중... 🌸</div>

        <div class="image-card-container">
            <img id="flower-img" src="" alt="꽃 이미지" />
        </div>

        <div class="recommend-box">
            <div id="flower-name" class="flower-badge">LOADING</div>
            <div id="place-name" class="place-title">추천 명소</div>
            <button class="detail-btn" onclick="toggleDetail()">🌸 신비의 꽃길 가이드 보기</button>
            <div id="detail-text" class="detail-content"></div>
        </div>

        <div id="flower-status" class="status-info">시즌 데이터 분석 중... 🌸</div>
        <div class="footer">계양구청 홍보미디어실 홍보팀</div>
    </div>

    <script>
const WEATHER_KEY = "b1322b09b83b481a5aa7e7bb6b51e11b6e4f389cc6edd2b8512d7df88fcc4";
const AREA_NO = "2824500000";

async function loadApp() {
  const now = new Date();
  const ymd = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');

  try {
    const weatherUrl = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey=${WEATHER_KEY}&dataType=JSON&numOfRows=200&pageNo=1&base_date=${ymd}&base_time=0500&nx=54&ny=126`;

    console.log("weatherUrl:", weatherUrl);

    const weatherRes = await fetch(weatherUrl);
    console.log("weatherRes status:", weatherRes.status);

    const weatherData = await weatherRes.json();
    console.log("weatherData:", weatherData);

    const items = weatherData?.response?.body?.items?.item || [];
    const tempItem = items.find(i => i.category === "TMP");
    const ptyItem = items.find(i => i.category === "PTY");

    if (!tempItem || !ptyItem) {
      throw new Error("TMP 또는 PTY 데이터가 없습니다.");
    }

    const temp = tempItem.fcstValue;
    const pty = ptyItem.fcstValue;

    const uvUrl = `https://apis.data.go.kr/1360000/LivingWthrIdxServiceV3/getUVIdxV3?serviceKey=$serviceKey=${WEATHER_KEY}&dataType=JSON&areaNo=${AREA_NO}&time=${ymd}12`;

    console.log("uvUrl:", uvUrl);

    const uvRes = await fetch(uvUrl);
    console.log("uvRes status:", uvRes.status);

    const uvData = await uvRes.json();
    console.log("uvData:", uvData);

    const uvItem = uvData?.response?.body?.items?.item?.[0];
    const uvVal = uvItem?.today || uvItem?.h0 || 0;

    updateDashboard(temp, pty, uvVal);
  } catch (e) {
    console.error("API ERROR:", e);
    document.getElementById("ment").innerText = "날씨 정보를 불러오지 못했어요 🌸";
  }
}

        // 꽃 데이터베이스 (생략 없이 취합)
const flowerDB = [
            { 
                id: "DAFFODIL", name: "수선화", place: "계양아라온", img: "flower_01_daffodil.png", 
                guide: "계양아라온에 대규모로 식재된 수선화 밭을 본 적 있어? 3월 말이면 끝없이 펼쳐진 노란 수선화가 우리를 반겨줘! 시원한 강바람 맞으며 노란 꽃길을 걷다 보면 기분까지 맑아질 거야. 신비랑 같이 수선화 꽃내음 맡으러 가보자!수향원에서 조금만 더 걸어오면 끝없이 펼쳐진 수선화밭을 만날수있어 😉",
                mapUrl: "https://naver.me/FQVGhxu8"
            },
            { 
                id: "AZALEA", name: "진달래", place: "계양산", img: "flower_02_azalea.png", 
                guide: "분홍빛으로 물든 계양산을 보고 싶다면 3월 25일경을 기억해 줘! 🌺 진달래는 역시 계양산 산책로가 최고인 거 알지? 등산화 끈 꽉 매고 신비랑 같이 진달래 보러 가자! 계양산엔 여러 등산로가 있지만 진달래를 만끽하기에는 계양산성박물관에서 시작해서 육각정 지나 하느재로 가는 코스가 최고야!⛰️",
                mapUrl: "https://naver.me/Gj6XOEGG"
            },
            { 
                id: "CHERRY", name: "벚꽃", place: "서부간선수로", img: "flower_03_cherryblossom.png", 
                guide: "안녕! 계양구에서 가장 아름다운 벚꽃길이 어딘지 알아? 바로 서부간선수로야! 🌸 물길을 따라 길게 이어진 벚꽃 터널은 정말 환상적이지. 바람이 불 때마다 흩날리는 벚꽃비를 맞으며 신비랑 같이 걸어보자! 이번 주말, 카메라 챙겨서 서부간선수로에서 만나! ✨참고로 주차는 계양체육관에 하면 편할거야! 무료는 아니지만 😉 ",
                mapUrl: "https://naver.me/xCByNMz0"
            },
            { 
                id: "ROSE", name: "장미", place: "계양산 장미원", img: "flower_04_rose.png", 
                guide: "장미 향기에 취하고 싶다면 5월 말에서 6월 초에 계양산 장미원을 찾아줘! 🌹수만 송이의 장미가 펼쳐지는 이곳은 사진 맛집으로도 유명해. 부모님 모시고 오거나 데이트 코스로도 완전 강추! 신비가 장미꽃 사이에서 숨바꼭질하고 있을지도 몰라~  만개시즌엔 주차장이 협소하니 대중교통을 이용하는게 좋아 😉",
                mapUrl: "https://naver.me/5iTI0W6A"
            },
            { 
                id: "WAITING", name: "개화 대기", place: "계양산 산책로", img: "waiting_flower.png", 
                guide: "아직은 꽃들이 고개를 내밀기 전이에요. 따뜻한 봄볕을 기다리며 깨끗한 공기를 마셔보세요! ❄️",
                mapUrl: ""
            },
            { 
                id: "ZINNIA", name: "백일홍", place: "계양아라온", img: "flower_05_zinnia.png", 
                guide: "백일 동안 붉게 핀다는 백일홍이 아라온을 가득 채웠어요. 알록달록한 꽃길을 걸어보세요! ❤️",
                mapUrl: "https://m.map.naver.com/search2/search.naver?query=계양아라온"
            },
            { 
                id: "MUM", name: "국화", place: "계양아라온", img: "flower_06_mum.png", 
                guide: "가을의 전령사 국화 향기가 가득해요. 고즈넉한 아라온의 가을 정취를 느껴보세요. 💛",
                mapUrl: "https://m.map.naver.com/search2/search.naver?query=계양아라온"
            },
        ];


        function getFlowerById(id) { return flowerDB.find(f => f.id === id) || flowerDB[6]; }

        // 비율 기반 추천 로직 (하한선 명확히!)
        function pickFlower(month, day) {
            const today = month * 100 + day;
            const seed = day;

            if (today < 315) return { ...getFlowerById("WAITING"), status: "내일의 꽃길을 준비 중이에요 ❄️" };
            if (today <= 325) { // 3/15~3/25 (진달래 3 : 수선화 1)
                const f = (seed % 4 === 0) ? getFlowerById("DAFFODIL") : getFlowerById("AZALEA");
                return { ...f, status: "진달래가 피기 시작한 계양의 봄입니다 ⛰️" };
            }
            if (today <= 331) { // 3/26~3/31 (수선화 3 : 진달래 1)
                const f = (seed % 4 === 0) ? getFlowerById("AZALEA") : getFlowerById("DAFFODIL");
                return { ...f, status: "노란 수선화 물결이 가장 예쁜 시기예요 🌼" };
            }
            if (today <= 415) { // 4/1~4/15 (벚꽃 3 : 수선화 1)
                const f = (seed % 4 === 0) ? getFlowerById("DAFFODIL") : getFlowerById("CHERRY");
                return { ...f, status: "벚꽃 팝콘이 팡팡 터지는 중! 🌸" };
            }
            if (today < 515) return { ...getFlowerById("WAITING"), status: "장미가 피기를 기다리고 있어요 🌿" };
            if (today <= 630) return { ...getFlowerById("ROSE"), status: "싱그러운 장미와 함께하는 초여름 🌹" };
            if (today <= 930 && today >= 825) return { ...getFlowerById("ZINNIA"), status: "아라온에 백일홍이 만개했어요 ❤️" };
            if (today <= 1110 && today >= 1001) return { ...getFlowerById("MUM"), status: "가을 국화 향기가 가득한 아라온입니다 🍂" };
            
            return { ...getFlowerById("WAITING"), status: "올해의 꽃길이 안녕을 고했어요 ❄️" };
        }

        async function loadApp() {
            const now = new Date();
            const ymd = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
            const hour = String(now.getHours()).padStart(2, '0') + "00";

            // 1. 기본 꽃 추천
            const flower = pickFlower(now.getMonth() + 1, now.getDate());
            renderFlower(flower);

            // 2. 날씨 & 생활지수 동시 호출
            try {
                // 단기예보 (기온/PTY)
                const weatherRes = await fetch(`https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey=${WEATHER_KEY}&dataType=JSON&numOfRows=10&pageNo=1&base_date=${ymd}&base_time=0500&nx=54&ny=126`);
                const weatherData = await weatherRes.json();
                const temp = weatherData.response.body.items.item.find(i => i.category === "TMP").fcstValue;
                const pty = weatherData.response.body.items.item.find(i => i.category === "PTY").fcstValue;

                // 생활지수 (자외선)
                const uvRes = await fetch(`https://apis.data.go.kr/1360000/LivingWthrIdxServiceV3/getUVIdxV3?serviceKey=${WEATHER_KEY}&dataType=JSON&areaNo=${AREA_NO}&time=${ymd}12`);
                const uvData = await uvRes.json();
                const uvVal = uvData.response.body.items.item[0].today;

                updateDashboard(temp, pty, uvVal);
            } catch (e) {
                document.getElementById("ment").innerText = "날씨에 상관없이 계양의 꽃길은 언제나 열려있어요 🌸";
            }
        }

        function updateDashboard(temp, pty, uv) {
            document.getElementById("temp-val").innerText = temp;
            
            // 자외선 텍스트 & 배지
            let uvText = "보통";
            if (uv >= 8) uvText = "매우높음";
            else if (uv >= 6) uvText = "높음";
            document.getElementById("uv-badge").innerText = `자외선 ${uvText}`;

            // 산책 지수 계산 (가상)
            let score = 95;
            if (pty !== "0") score -= 40;
            if (temp < 5 || temp > 30) score -= 15;
            if (uv >= 8) score -= 10;
            document.getElementById("score-badge").innerText = `산책지수 ${score}점`;

            // 종합 멘트
            let ment = `오늘 기온은 ${temp}도입니다. `;
            if (pty !== "0") ment += "비 소식이 있으니 우산을 꼭 챙기세요! ☔";
            else if (uv >= 6) ment += "햇살이 따가우니 선크림을 꼭 바르고 산책하세요! ☀️";
            else ment += "날씨가 쾌적해서 꽃길 걷기 참 좋은 날이에요! 🌿";
            document.getElementById("ment").innerText = ment;
        }

        function renderFlower(flower) {
            document.getElementById("flower-name").innerText = flower.name;
            document.getElementById("place-name").innerText = flower.place;
            document.getElementById("flower-img").src = "./" + flower.img;
            document.getElementById("flower-status").innerText = flower.status;
            document.getElementById("detail-text").innerHTML = `
                <div>${flower.guide}</div>
                ${flower.mapUrl ? `<a href="${flower.mapUrl}" target="_blank" class="map-link-btn">📍 네이버 지도로 길 찾기</a>` : ''}
            `;
        }

        function toggleDetail() {
            const d = document.getElementById("detail-text");
            d.style.display = d.style.display === "block" ? "none" : "block";
        }

        loadApp();
    </script>
</body>
</html>
