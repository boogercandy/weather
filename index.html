<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>신비의 계양 꽃길 가이드</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        * { box-sizing: border-box; }
        body {
            font-family: 'Pretendard', sans-serif;
            background: #fffcf9;
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #444;
        }

        .app-container {
            width: 92%;
            max-width: 420px;
            background: white;
            border-radius: 35px;
            padding: 35px 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.06);
            text-align: center;
            border: 1px solid #f0f0f0;
        }

        .weather-title { font-size: 1.3rem; font-weight: 700; color: #333; margin-bottom: 8px; }
        .weather-title span { color: #ff4d6d; }
        .weather-ment { font-size: 0.95rem; color: #777; margin-bottom: 24px; line-height: 1.6; word-break: keep-all; }

        .image-card-container {
            width: 100%;
            aspect-ratio: 2 / 1;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            background: #fdf2f4;
        }

        .image-card-container img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .recommend-box {
            background: #fff5f6;
            border-radius: 30px;
            padding: 25px;
            position: relative;
            border: 1px solid #ffe4e6;
        }

        .flower-badge {
            background: #ff9a9e;
            color: white;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 10px rgba(255, 154, 158, 0.2);
            white-space: nowrap;
        }

        .place-title { font-size: 1.6rem; font-weight: 800; color: #ff4d6d; margin: 10px 0; }
        
        .detail-btn {
            background: white;
            border: 1px solid #ff9a9e;
            color: #ff9a9e;
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .detail-btn:hover { background: #ff9a9e; color: white; }

        .detail-content {
            display: none;
            margin-top: 18px;
            font-size: 0.92rem;
            color: #666;
            line-height: 1.7;
            text-align: left;
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #f0f0f0;
            word-break: keep-all;
        }

        /* 네이버 지도 버튼 스타일 */
        .map-link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #03C75A;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            transition: 0.2s;
        }
        .map-link-btn:active { opacity: 0.8; transform: scale(0.98); }

        .status-info { margin-top: 25px; font-size: 0.82rem; color: #ff7b8f; font-weight: 700; }
        .footer { margin-top: 35px; font-size: 0.72rem; color: #c8c8c8; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="weather-title">계양구의 현재 날씨는 <span id="temp-val">--°</span></div>
        <div id="ment" class="weather-ment">오늘의 꽃길을 불러오고 있어요. 🌸</div>

        <div class="image-card-container">
            <img id="flower-img" src="" alt="꽃 명소 이미지" />
        </div>

        <div class="recommend-box">
            <div id="flower-name" class="flower-badge">LOADING</div>
            <div id="place-name" class="place-title">추천 명소</div>
            <button class="detail-btn" onclick="toggleDetail()">🌸 신비의 꽃길 가이드 보기</button>
            <div id="detail-text" class="detail-content"></div>
        </div>

        <div id="flower-status" class="status-info">계절 꽃 추천 준비 중 🌸</div>
        <div class="footer">계양구청 홍보미디어실 홍보팀</div>
    </div>

    <script>
        // 날씨 API 키 (사용자 키 입력 필요)
        const WEATHER_KEY = "9cfb1322b09b83b481a5aa7e7bb6b51e11b6e4f389cc6edd2b8512d7df88fcc4";

        // 2026년 예상 개화 시기 (월*100 + 일)
        const BLOOM_DATES = {
            DAFFODIL: { start: 315, peak: 322 },   // 수선화: 3/15
            AZALEA: { start: 323, peak: 330 },     // 진달래: 3/23
            CHERRY: { start: 401, peak: 408 },     // 벚꽃: 4/1
            ROSE: { start: 515, peak: 525 }        // 장미: 5/15
        };

        const flowerDB = [
            { 
                id: "DAFFODIL", name: "수선화", place: "계양아라온", img: "flower_01_daffodil.png", 
                guide: "계양아라온에 대규모로 식재된 수선화 밭을 본 적 있어? 3월 말이면 끝없이 펼쳐진 노란 수선화가 우리를 반겨줘! 시원한 강바람 맞으며 노란 꽃길을 걷다 보면 기분까지 맑아질 거야. 신비랑 같이 수선화 꽃내음 맡으러 가보자!수향원에서 조금만 더 걸어오면 끝없이 펼쳐진 수선화밭을 만날수있어 😉",
                mapUrl: "https://naver.me/FQVGhxu8"
            },
            { 
                id: "AZALEA", name: "진달래", place: "계양산", img: "flower_02_azalea.png", 
                guide: "분홍빛으로 물든 계양산을 보고 싶다면 3월 25일경을 기억해 줘! 🌺 진달래는 역시 계양산 산책로가 최고인 거 알지? 등산화 끈 꽉 매고 신비랑 같이 진달래 보러 가자! 계양산엔 여러 등산로가 있지만 진달래를 만끽하기에는 계양산성박물관에서 시작해서 육각정 지나 하느재로 가는 코스가 최고야!⛰️",
                mapUrl: "https://naver.me/Gj6XOEGG"
            },
            { 
                id: "CHERRY", name: "벚꽃", place: "서부간선수로", img: "flower_03_cherryblossom.png", 
                guide: "안녕! 계양구에서 가장 아름다운 벚꽃길이 어딘지 알아? 바로 서부간선수로야! 🌸 물길을 따라 길게 이어진 벚꽃 터널은 정말 환상적이지. 바람이 불 때마다 흩날리는 벚꽃비를 맞으며 신비랑 같이 걸어보자! 이번 주말, 카메라 챙겨서 서부간선수로에서 만나! ✨참고로 주차는 계양체육관에 하면 편할거야! 무료는 아니지만 😉 ",
                mapUrl: "https://naver.me/xCByNMz0"
            },
            { 
                id: "ROSE", name: "장미", place: "계양산 장미원", img: "flower_04_rose.png", 
                guide: "장미 향기에 취하고 싶다면 5월 말에서 6월 초에 계양산 장미원을 찾아줘! 🌹수만 송이의 장미가 펼쳐지는 이곳은 사진 맛집으로도 유명해. 부모님 모시고 오거나 데이트 코스로도 완전 강추! 신비가 장미꽃 사이에서 숨바꼭질하고 있을지도 몰라~  만개시즌엔 주차장이 협소하니 대중교통을 이용하는게 좋아 😉",
                mapUrl: "https://naver.me/5iTI0W6A"
            },
            { 
                id: "WAITING", name: "개화 대기", place: "계양산 산책로", img: "waiting_flower.png", 
                guide: "아직은 꽃들이 고개를 내밀기 전이에요. 따뜻한 봄볕을 기다리며 깨끗한 공기를 마셔보세요! ❄️",
                mapUrl: ""
            },
            { 
                id: "ZINNIA", name: "백일홍", place: "계양아라온", img: "flower_05_zinnia.png", 
                guide: "백일 동안 붉게 핀다는 백일홍이 아라온을 가득 채웠어요. 알록달록한 꽃길을 걸어보세요! ❤️",
                mapUrl: "https://m.map.naver.com/search2/search.naver?query=계양아라온"
            },
            { 
                id: "MUM", name: "국화", place: "계양아라온", img: "flower_06_mum.png", 
                guide: "가을의 전령사 국화 향기가 가득해요. 고즈넉한 아라온의 가을 정취를 느껴보세요. 💛",
                mapUrl: "https://m.map.naver.com/search2/search.naver?query=계양아라온"
            },
        ];

        function getFlowerById(id) {
            return flowerDB.find(f => f.id === id) || flowerDB[4];
        }

function pickFlower(month, day) {
    const today = month * 100 + day;
    const seed = day;

    // 1. [겨울~초봄] 3월 14일 이전
    if (today < 315) {
        return { ...getFlowerById("WAITING"), status: "아직은 꽃들을 좀 더 기다려야 해요 ❄️" };
    }

    // 2. [봄 혼합 1] 3월 15일 ~ 3월 25일 (진달래 3 : 수선화 1)
    else if (today <= 325) {
        const flower = (seed % 4 === 0) ? getFlowerById("DAFFODIL") : getFlowerById("AZALEA");
        return { ...flower, status: "진달래와 수선화가 함께 봄 인사를 건네요 ⛰️" };
    }

    // 3. [봄 혼합 2] 3월 26일 ~ 3월 31일 (수선화 3 : 진달래 1)
    else if (today <= 331) {
        const flower = (seed % 4 === 0) ? getFlowerById("AZALEA") : getFlowerById("DAFFODIL");
        return { ...flower, status: "화사한 수선화 물결 속 진달래를 찾아보세요 🌼" };
    }

    // 4. [벚꽃 시즌] 4월 1일 ~ 4월 15일 (벚꽃 3 : 수선화 1)
    else if (today <= 415) {
        const flower = (seed % 4 === 0) ? getFlowerById("DAFFODIL") : getFlowerById("CHERRY");
        return { ...flower, status: (flower.id === "CHERRY") ? "벚꽃이 눈처럼 내리는 아름다운 길이에요 🌸" : "벚꽃 아래 노란 수선화가 참 예쁘죠? 💛" };
    }

    // 5. [장미 준비] 4월 16일 ~ 5월 14일
    else if (today < 515) {
        return { ...getFlowerById("WAITING"), status: "벚꽃이 지고 다음 꽃을 준비하는 시기예요 🌿" };
    }

    // 6. [장미 시즌] 5월 15일 ~ 6월 30일
    else if (today <= 630) {
        return { ...getFlowerById("ROSE"), status: "싱그러운 계절의 여왕, 장미를 만나보세요! 🌹" };
    }

    // 7. [여름 대기] 7월 1일 ~ 8월 24일
    else if (today < 825) {
        return { ...getFlowerById("WAITING"), status: "뜨거운 여름, 다음 꽃길을 정성껏 가꾸고 있어요 ☀️" };
    }

    // 8. [백일홍 시즌] 8월 25일 ~ 9월 30일 (계양아라온)
    else if (today <= 930) {
        return { ...getFlowerById("ZINNIA"), status: "아라온에 백일홍이 만개했어요! 알록달록 꽃길 산책 어떠세요? 🌈" };
    }

    // 9. [국화 시즌] 10월 1일 ~ 11월 10일 (계양아라온)
    else if (today <= 1110) {
        return { ...getFlowerById("MUM"), status: "가을 향기 가득한 국화가 아라온을 수놓았어요 🍂" };
    }

    // 10. [늦가을~겨울] 11월 11일 ~ 12월 31일
    else {
        return { ...getFlowerById("WAITING"), status: "올해의 꽃들이 안녕을 고했어요. 내년 봄을 기다려주세요! ❄️" };
    }

}

        function renderApp(flower) {
            document.getElementById("flower-name").innerText = flower.name;
            document.getElementById("place-name").innerText = flower.place;
            document.getElementById("flower-img").src = "./" + flower.img;
            document.getElementById("flower-status").innerText = flower.status;

            const detailBox = document.getElementById("detail-text");
            detailBox.innerHTML = `
                <div>${flower.guide}</div>
                ${flower.mapUrl ? `<a href="${flower.mapUrl}" target="_blank" class="map-link-btn">📍 네이버 지도로 길 찾기</a>` : ''}
            `;
        }

        function toggleDetail() {
            const detail = document.getElementById("detail-text");
            detail.style.display = detail.style.display === "block" ? "none" : "block";
        }

        async function loadApp() {
            const now = new Date();
            const month = now.getMonth() + 1;
            const day = now.getDate();

            const flower = pickFlower(month, day);
            renderApp(flower);

            // 기상청 API 연동 (기존 로직 유지)
            // ... 생략 ...
        }

        loadApp();
    </script>
</body>
</html>
