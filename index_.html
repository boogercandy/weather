<script>
const WEATHER_KEY = "9cfb1322b09b83b481a5aa7e7bb6b51e11b6e4f389cc6edd2b8512d7df88fcc4";
const AREA_NO = "2824500000";

// 꽃 DB
const flowerDB = [
  { id: "DAFFODIL", name: "수선화", place: "계양아라온", img: "flower_01_daffodil.png",
    guide: "계양아라온 수선화밭 🌼", mapUrl: "https://naver.me/FQVGhxu8" },
  { id: "AZALEA", name: "진달래", place: "계양산", img: "flower_02_azalea.png",
    guide: "계양산 진달래 🌺", mapUrl: "https://naver.me/Gj6XOEGG" },
  { id: "CHERRY", name: "벚꽃", place: "서부간선수로", img: "flower_03_cherryblossom.png",
    guide: "벚꽃 터널 🌸", mapUrl: "https://naver.me/xCByNMz0" },
  { id: "ROSE", name: "장미", place: "계양산 장미원", img: "flower_04_rose.png",
    guide: "장미 명소 🌹", mapUrl: "https://naver.me/5iTI0W6A" },
  { id: "WAITING", name: "개화 대기", place: "계양산", img: "waiting_flower.png",
    guide: "아직 개화 전 ❄️", mapUrl: "" }
];

function getFlowerById(id) {
  return flowerDB.find(f => f.id === id) || flowerDB[0];
}

function pickFlower(month, day) {
  const today = month * 100 + day;

  if (today < 315) return getFlowerById("WAITING");
  if (today <= 331) return getFlowerById("DAFFODIL");
  if (today <= 415) return getFlowerById("CHERRY");
  if (today <= 630) return getFlowerById("ROSE");

  return getFlowerById("WAITING");
}

function renderFlower(flower) {
  document.getElementById("flower-name").innerText = flower.name;
  document.getElementById("place-name").innerText = flower.place;
  document.getElementById("flower-img").src = "./" + flower.img;
  document.getElementById("detail-text").innerHTML = `
    <div>${flower.guide}</div>
    ${flower.mapUrl ? `<a href="${flower.mapUrl}" target="_blank" class="map-link-btn">📍 지도 보기</a>` : ""}
  `;
}

function updateDashboard(temp, pty, uv) {
  document.getElementById("temp-val").innerText = temp;

  let uvText = "보통";
  if (uv >= 8) uvText = "매우높음";
  else if (uv >= 6) uvText = "높음";
  document.getElementById("uv-badge").innerText = `자외선 ${uvText}`;

  let score = 95;
  if (pty !== "0") score -= 40;
  if (Number(temp) < 5 || Number(temp) > 30) score -= 15;
  if (uv >= 8) score -= 10;

  document.getElementById("score-badge").innerText = `산책지수 ${score}점`;

  let ment = `오늘 기온 ${temp}도. `;
  if (pty !== "0") ment += "비가 와요 ☔";
  else if (uv >= 6) ment += "햇빛 강함 ☀️";
  else ment += "산책하기 좋아요 🌿";

  document.getElementById("ment").innerText = ment;
}

function toggleDetail() {
  const d = document.getElementById("detail-text");
  d.style.display = d.style.display === "block" ? "none" : "block";
}

async function fetchJsonSafe(url, label) {
  console.log(label + " URL:", url);

  const res = await fetch(url);
  console.log(label + " status:", res.status);

  const text = await res.text();
  console.log(label + " raw:", text);

  if (!res.ok) {
    throw new Error(`${label} 실패 (${res.status}): ${text}`);
  }

  return JSON.parse(text);
}

function getBaseDateTime(now = new Date()) {
  // 초단기 예보/단기예보 발표 시각을 아주 정교하게 맞춘 건 아니고,
  // 일단 기존 0500 고정 대신 조금 더 안전하게 처리
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");

  return {
    ymd: `${y}${m}${d}`,
    baseTime: "0500"
  };
}

async function loadWeather() {
  const now = new Date();
  const { ymd, baseTime } = getBaseDateTime(now);

  const weatherUrl =
    `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst` +
    `?serviceKey=${WEATHER_KEY}` +
    `&dataType=JSON&numOfRows=200&pageNo=1` +
    `&base_date=${ymd}&base_time=${baseTime}&nx=54&ny=126`;

  const weatherData = await fetchJsonSafe(weatherUrl, "weather");
  const items = weatherData?.response?.body?.items?.item || [];

  const tempItem = items.find(i => i.category === "TMP");
  const ptyItem = items.find(i => i.category === "PTY");

  const temp = tempItem?.fcstValue;
  const pty = ptyItem?.fcstValue || "0";

  if (temp === undefined || temp === null || temp === "") {
    throw new Error("기온 데이터 없음");
  }

  return { temp, pty, ymd };
}

async function loadUV(ymd) {
  const uvUrl =
    `https://apis.data.go.kr/1360000/LivingWthrIdxServiceV3/getUVIdxV3` +
    `?serviceKey=${WEATHER_KEY}` +
    `&dataType=JSON&areaNo=${AREA_NO}&time=${ymd}12`;

  const uvData = await fetchJsonSafe(uvUrl, "uv");

  const item = uvData?.response?.body?.items?.item?.[0];
  const uv = Number(item?.today ?? 0);

  return Number.isNaN(uv) ? 0 : uv;
}

async function loadApp() {
  const now = new Date();

  // 1) 꽃 정보는 먼저 표시
  const flower = pickFlower(now.getMonth() + 1, now.getDate());
  renderFlower(flower);

  // 기본 상태값
  document.getElementById("uv-badge").innerText = "자외선 확인중";
  document.getElementById("score-badge").innerText = "산책지수 계산중";
  document.getElementById("ment").innerText = "날씨 데이터를 불러오는 중이에요 🌸";

  let temp = null;
  let pty = "0";
  let uv = 0;

  // 2) 날씨 먼저 읽고, 성공하면 바로 온도 표시
  try {
    const weather = await loadWeather();
    temp = weather.temp;
    pty = weather.pty;

    document.getElementById("temp-val").innerText = temp;
    document.getElementById("ment").innerText = `오늘 기온 ${temp}도 확인 완료 🌸`;

    // 3) UV는 실패해도 기본값으로 진행
    try {
      uv = await loadUV(weather.ymd);
    } catch (uvError) {
      console.warn("UV API 실패. 기본값 0으로 처리합니다.", uvError);
      uv = 0;
    }

    // 4) 최종 대시보드 갱신
    updateDashboard(temp, pty, uv);

  } catch (weatherError) {
    console.error("WEATHER ERROR:", weatherError);

    document.getElementById("temp-val").innerText = "--";
    document.getElementById("uv-badge").innerText = "자외선 --";
    document.getElementById("score-badge").innerText = "산책지수 --점";
    document.getElementById("ment").innerText = "⚠️ 기온 데이터를 불러오지 못했어요";
  }
}

loadApp();
</script>
